<article class="card">
  {% set image_src = product_image_src(product.image_url, product.image_path) %}
  {% if image_src %}
    <p><img src="{{ image_src }}" alt="{{ product.title }}" class="product-image"></p>
  {% endif %}
  <h2><a href="/product/{{ product.slug }}">{{ product.title }}</a></h2>
  <p>{{ product.short_description }}</p>
  <p><strong>{{ format_xmr(product.price_atomic) }} XMR</strong></p>
  <form method="post" action="/cart/add">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="product_id" value="{{ product.id }}">
    <input type="hidden" name="quantity" value="1">
    <button type="submit">Add to cart</button>
  </form>
</article>
