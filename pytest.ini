[pytest]
addopts = -ra
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    unit: fast isolated unit tests
    db: sqlite schema and persistence tests
    webshop: public webshop route and flow tests
    admin: admin route and flow tests
    service: service-layer tests (poller, lifecycle)
    security: security and validation tests
    integration: cross-service integration tests
    optional_integration: optional docker/staging smoke tests
filterwarnings =
    ignore::DeprecationWarning:services.webshop.main
    ignore::DeprecationWarning:services.admin.main
    ignore::DeprecationWarning:fastapi.applications
    ignore::DeprecationWarning:starlette.templating
